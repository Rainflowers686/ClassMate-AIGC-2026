name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Core unit tests (:core:test)
        run: ./gradlew :core:test --console=plain --stacktrace

      - name: App unit tests (:app:testDebugUnitTest)
        run: ./gradlew :app:testDebugUnitTest --console=plain --stacktrace

      - name: Assemble debug APK (:app:assembleDebug)
        run: ./gradlew :app:assembleDebug --console=plain --stacktrace

      # NOTE: we deliberately do NOT upload the APK as an artifact (per project policy).
      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 7
