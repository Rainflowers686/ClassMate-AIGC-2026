name: Secrets Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secrets scan
        run: bash scripts/secrets_scan/secrets_scan.sh

      - name: Assert no real config.local.json is tracked
        run: |
          if git ls-files --error-unmatch config.local.json >/dev/null 2>&1; then
            echo "config.local.json must never be committed"; exit 1
          fi
          echo "OK"
