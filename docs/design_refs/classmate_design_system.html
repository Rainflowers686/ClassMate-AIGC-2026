  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"zh-CN\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>ClassMate · 三主题设计系统交接稿<\u002Ftitle>\n<style>\n  :root{\n    --ink:#1c1c1e; --ink2:#5f6168; --ink3:#8e9099;\n    --blue:#3a64d8; --bg:#f3f4f7; --card:#fff; --sep:rgba(60,60,67,.10);\n    --sys:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;\n    --mono:ui-monospace,'SF Mono',Menlo,monospace;\n    --ok:#4a9b76; --warn:#b78a3e; --vit:#515ed0; --flow:#e0a86a;\n  }\n  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}\n  html{scroll-behavior:smooth;}\n  body{margin:0;background:var(--bg);font-family:var(--sys);color:var(--ink);line-height:1.6;}\n  .wrap{max-width:1120px;margin:0 auto;padding:0 32px;}\n  .mono{font-family:var(--mono);}\n  a{color:var(--blue);text-decoration:none;}\n\n  /* cover */\n  .cover{padding:72px 0 36px;}\n  .badge{display:inline-flex;align-items:center;gap:9px;padding:6px 14px 6px 7px;border-radius:999px;background:#fff;border:.5px solid var(--sep);box-shadow:0 1px 2px rgba(20,24,40,.04);margin-bottom:18px;}\n  .badge i{width:24px;height:24px;border-radius:7px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-style:normal;}\n  .badge span{font-family:var(--mono);font-size:12.5px;color:var(--ink2);}\n  h1{font-size:40px;font-weight:700;letter-spacing:-.025em;margin:0;}\n  .lede{font-size:17px;color:var(--ink2);max-width:680px;margin:14px 0 0;}\n\n  /* toc */\n  nav.toc{display:flex;flex-wrap:wrap;gap:8px;margin:28px 0 8px;}\n  nav.toc a{font-size:13px;font-weight:500;color:var(--ink2);background:#fff;border:.5px solid var(--sep);border-radius:999px;padding:7px 14px;transition:.15s;}\n  nav.toc a:hover{color:var(--blue);border-color:var(--blue);}\n\n  section{padding:40px 0 8px;}\n  .sec-h{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;}\n  .sec-h .n{font-family:var(--mono);font-size:14px;color:var(--blue);font-weight:600;}\n  h2{font-size:26px;font-weight:700;letter-spacing:-.02em;margin:0;}\n  .sec-sub{color:var(--ink3);font-size:14.5px;margin:6px 0 22px;}\n\n  .card{background:var(--card);border:.5px solid var(--sep);border-radius:18px;padding:24px;box-shadow:0 1px 2px rgba(20,24,40,.03),0 14px 36px -28px rgba(20,24,40,.3);}\n  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}\n  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n\n  .theme-h{display:flex;align-items:center;gap:10px;margin-bottom:14px;}\n  .theme-h .dot{width:14px;height:14px;border-radius:5px;}\n  .theme-h b{font-size:18px;font-weight:700;}\n  .theme-h em{font-style:normal;font-size:12px;color:var(--ink3);font-family:var(--mono);}\n  .kv{margin:0;font-size:13.5px;}\n  .kv dt{color:var(--ink3);font-size:11.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;margin-top:13px;}\n  .kv dd{margin:2px 0 0;color:var(--ink);}\n  .kv dd.muted{color:var(--ink2);}\n  .avoid{color:#b0503f;}\n\n  table{width:100%;border-collapse:collapse;font-size:13.5px;}\n  th,td{text-align:left;padding:11px 12px;border-bottom:.5px solid var(--sep);vertical-align:top;}\n  th{font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink3);background:rgba(60,60,67,.02);}\n  td.lbl{font-weight:600;white-space:nowrap;}\n  tr:last-child td{border-bottom:none;}\n  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;}\n  .pill.focus{background:rgba(58,100,216,.1);color:#3a64d8;}\n  .pill.vit{background:rgba(81,94,208,.12);color:#515ed0;}\n  .pill.flow{background:rgba(224,168,106,.16);color:#a9742f;}\n\n  /* token table */\n  .tok td{font-family:var(--mono);font-size:12px;}\n  .tok td.name{font-family:var(--sys);font-weight:600;font-size:12.5px;white-space:nowrap;}\n  .sw{display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}\n  .sw i{width:18px;height:18px;border-radius:5px;border:.5px solid rgba(0,0,0,.12);flex-shrink:0;}\n  .chk{background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0;}\n\n  ul.tight{margin:8px 0 0;padding-left:18px;}\n  ul.tight li{margin:5px 0;font-size:13.5px;color:var(--ink2);}\n  ul.tight li b{color:var(--ink);}\n\n  .prio{border-radius:16px;padding:20px 22px;border:.5px solid var(--sep);}\n  .prio .ph{display:flex;align-items:center;gap:10px;margin-bottom:12px;}\n  .prio .tag{font-family:var(--mono);font-weight:700;font-size:13px;padding:3px 10px;border-radius:8px;}\n  .p0 .tag{background:#fdeceA;background:rgba(178,80,63,.12);color:#b0503f;}\n  .p1 .tag{background:rgba(58,100,216,.1);color:#3a64d8;}\n  .p2 .tag{background:rgba(74,155,118,.12);color:#3f8666;}\n\n  .rules li{margin:9px 0;font-size:14px;color:var(--ink);list-style:none;position:relative;padding-left:28px;}\n  .rules li::before{content:\"\";position:absolute;left:4px;top:7px;width:7px;height:7px;border-radius:99px;background:var(--blue);}\n  .rules{padding:0;margin:0;}\n\n  pre{background:#16181f;color:#e7e9ef;border-radius:16px;padding:22px 24px;overflow:auto;font-family:var(--mono);font-size:12.5px;line-height:1.65;border:1px solid rgba(255,255,255,.06);}\n  pre .c{color:#7f8aa3;}\n  pre b{color:#e0a86a;font-weight:600;}\n  pre .g{color:#8fc6a0;}\n\n  footer{padding:40px 0 80px;color:var(--ink3);font-size:13px;}\n  .note{font-size:12.5px;color:var(--ink3);margin-top:10px;line-height:1.5;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <div class=\"cover\">\n    <div class=\"badge\"><i>C<\u002Fi><span>ClassMate · Design System Handoff<\u002Fspan><\u002Fdiv>\n    <h1>三主题设计系统 · Compose 工程交接稿<\u002Fh1>\n    <p class=\"lede\">Focus（默认）/ Vitality（可选增强）/ Flow（沉浸陪学）三套主题的最终定位、页面适配、设计 token、组件系统、动效规范、落地优先级与工程边界。本稿为收束文档——不再发散新视觉方向。<\u002Fp>\n    <nav class=\"toc\">\n      <a href=\"#s1\">① 主题定位<\u002Fa>\n      <a href=\"#s2\">② 页面适配<\u002Fa>\n      <a href=\"#s3\">③ 设计 Token<\u002Fa>\n      <a href=\"#s4\">④ 组件系统<\u002Fa>\n      <a href=\"#s5\">⑤ 动效规范<\u002Fa>\n      <a href=\"#s6\">⑥ 落地优先级<\u002Fa>\n      <a href=\"#s7\">⑦ 工程边界<\u002Fa>\n      <a href=\"#s8\">⑧ 实现摘要<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n\n  <!-- ① -->\n  <section id=\"s1\">\n    <div class=\"sec-h\"><span class=\"n\">01<\u002Fspan><h2>三主题最终定位<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">同一产品、同一信息架构，三种气质。Focus 是地基，Vitality 是可选皮肤，Flow 是专注场景下的氛围层。<\u002Fp>\n    <div class=\"grid3\">\n      <div class=\"card\">\n        <div class=\"theme-h\"><span class=\"dot\" style=\"background:#3a64d8\"><\u002Fspan><b>Focus<\u002Fb><em>默认 · default<\u002Fem><\u002Fdiv>\n        <dl class=\"kv\">\n          <dt>视觉关键词<\u002Fdt><dd>克制 · 白静 · 高级 · 系统原生感<\u002Fdd>\n          <dt>适用场景<\u002Fdt><dd>日常主用：Home / Review / History / Settings 等全部任务型页面<\u002Fdd>\n          <dt>背景风格<\u002Fdt><dd class=\"muted\">暖白冷灰 #f3f4f7，极淡渐变，无氛围图<\u002Fdd>\n          <dt>主色<\u002Fdt><dd class=\"muted\">克制蓝 #3a64d8，仅点缀主行动/选中/链接<\u002Fdd>\n          <dt>卡片质感<\u002Fdt><dd class=\"muted\">白底 + 0.5dp 发丝线 + 极弱阴影，几乎不用 blur<\u002Fdd>\n          <dt>动效风格<\u002Fdt><dd class=\"muted\">微妙 spring，淡入 + 10dp 上移，无 bounce<\u002Fdd>\n          <dt class=\"avoid\">必须避免<\u002Fdt><dd class=\"avoid\">重玻璃折射、赛博感、AI 海报、大面积高饱和、假 iOS 外壳<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"theme-h\"><span class=\"dot\" style=\"background:#515ed0\"><\u002Fspan><b>Vitality<\u002Fb><em>可选增强 · opt-in<\u002Fem><\u002Fdiv>\n        <dl class=\"kv\">\n          <dt>视觉关键词<\u002Fdt><dd>成长 · 鼓励 · 轻玻璃层级 · 活泼有序<\u002Fdd>\n          <dt>适用场景<\u002Fdt><dd>用户主动开启的增强皮肤；强化成长反馈、连续学习、完成激励<\u002Fdd>\n          <dt>背景风格<\u002Fdt><dd class=\"muted\">浅冷白 #eef1f6 + 极淡光晕，去掉重蓝紫渐变<\u002Fdd>\n          <dt>主色<\u002Fdt><dd class=\"muted\">靛蓝 #515ed0 + 成长绿/鼓励暖橙做次强调<\u002Fdd>\n          <dt>卡片质感<\u002Fdt><dd class=\"muted\">轻玻璃半透明 + 边缘高光 + 悬浮层级（克制）<\u002Fdd>\n          <dt>动效风格<\u002Fdt><dd class=\"muted\">完成/连击有正反馈，幅度略大但不花哨<\u002Fdd>\n          <dt class=\"avoid\">必须避免<\u002Fdt><dd class=\"avoid\">海报感、霓虹蓝紫、过度玻璃、堆砌数据与图标<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"theme-h\"><span class=\"dot\" style=\"background:#e0a86a\"><\u002Fspan><b>Flow<\u002Fb><em>沉浸场景 · ambient<\u002Fem><\u002Fdiv>\n        <dl class=\"kv\">\n          <dt>视觉关键词<\u002Fdt><dd>沉浸 · 陪伴 · 呼吸感 · 轻底噪<\u002Fdd>\n          <dt>适用场景<\u002Fdt><dd>仅 Live Companion / 专注计时 / 声音场景，不接管任务页<\u002Fdd>\n          <dt>背景风格<\u002Fdt><dd class=\"muted\">深色环境氛围（夜间书桌/窗边下雨/雨后草地/白噪音）<\u002Fdd>\n          <dt>主色<\u002Fdt><dd class=\"muted\">随场景：暖 #e0a86a / 雨蓝 #8fb6dd / 草绿 #8fc6a0 / 中性 #9fb0c4<\u002Fdd>\n          <dt>卡片质感<\u002Fdt><dd class=\"muted\">深色半透明面 + 微高光，blur 可选、优先半透明模拟<\u002Fdd>\n          <dt>动效风格<\u002Fdt><dd class=\"muted\">慢速漂移、呼吸环、细雨/光晕、声波微动，极克制<\u002Fdd>\n          <dt class=\"avoid\">必须避免<\u002Fdt><dd class=\"avoid\">插画海报、游戏场景、影响阅读的强动效与高对比氛围<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ② -->\n  <section id=\"s2\">\n    <div class=\"sec-h\"><span class=\"n\">02<\u002Fspan><h2>页面适配策略<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">铁律：同一功能在不同主题下<b>只换视觉 token 与局部氛围，绝不改变功能结构、信息层级或数据流<\u002Fb>。<\u002Fp>\n    <div class=\"card\" style=\"padding:8px 8px 0;\">\n      <table>\n        <thead><tr><th>页面<\u002Fth><th>默认主题<\u002Fth><th>Vitality（可选）<\u002Fth><th>Flow（仅氛围）<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"lbl\">Home 首页<\u002Ftd><td><span class=\"pill focus\">Focus<\u002Fspan> 白静卡片、今日待复习数字、克制蓝主按钮<\u002Ftd><td>同结构换皮：轻玻璃卡 + 连续学习/成长进度更突出<\u002Ftd><td>不接管；可入口跳转 Flow 专注<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">Review 复习页<\u002Ftd><td><span class=\"pill focus\">Focus<\u002Fspan> 任务队列、理由、优先级、安静反馈条<\u002Ftd><td>完成任务时正反馈更明显（绿勾 + 轻微弹性）<\u002Ftd><td>不接管<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">History 历史页<\u002Ftd><td><span class=\"pill focus\">Focus<\u002Fspan> 分组 inset 列表、搜索、可重开<\u002Ftd><td>同结构，列表项 hover/选中更有层级感<\u002Ftd><td>不接管<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">Settings 设置页<\u002Ftd><td><span class=\"pill focus\">Focus<\u002Fspan> 分组列表、三模式、诊断、masked key<\u002Ftd><td>同结构换皮；主题切换开关位于此处<\u002Ftd><td>不接管<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">Knowledge Timeline 知识时间线<\u002Ftd><td><span class=\"pill focus\">Focus<\u002Fspan> 纵向时间轴、节点卡、阶段分段<\u002Ftd><td>节点完成态更鼓励（描边/勾选动效）<\u002Ftd><td>课中实时缓存视图可用 Flow 氛围（深色 + 节点呼吸）<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">Quiz 微测页<\u002Ftd><td><span class=\"pill focus\">Focus<\u002Fspan> 单题聚焦、证据卡、四态反馈<\u002Ftd><td>答对/连对正反馈增强，进度环鼓励色<\u002Ftd><td>不接管<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">Live Companion 课堂伴学<\u002Ftd><td>可用 Focus 的浅色信息版<\u002Ftd><td>—<\u002Ftd><td><span class=\"pill flow\">Flow<\u002Fspan> 主场景：沉浸专注、呼吸计时、声音场景、混音、阶段总结<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <p class=\"note\">说明：Live Companion 当前为<b>手动 / 模拟转写演示<\u002Fb>，UI 必须常驻“模拟 / 即将接入 ASR”标注；Flow 仅作用于沉浸场景，任务型页面始终回到 Focus。<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ③ -->\n  <section id=\"s3\">\n    <div class=\"sec-h\"><span class=\"n\">03<\u002Fspan><h2>Jetpack Compose 设计 Token<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">命名可直接落地为 <span class=\"mono\">ClassMateColors<\u002Fspan> 数据类的字段。半透明值给出 rgba 与建议 alpha；Flow 为深色，<span class=\"mono\">primary/accent/navSelected<\u002Fspan> 随场景切换（下表取默认「夜间书桌」）。<\u002Fp>\n    <div class=\"card\" style=\"padding:8px 8px 0;\">\n      <table class=\"tok\">\n        <thead><tr><th>token<\u002Fth><th>Focus（默认）<\u002Fth><th>Vitality<\u002Fth><th>Flow · desk（深色）<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"name\">background<\u002Ftd><td><span class=\"sw\"><i style=\"background:#f3f4f7\"><\u002Fi>#F3F4F7<\u002Fspan><\u002Ftd><td><span cl k\"><\u002Fi>#FFFFFF · α.88<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i class=\"chk\"><\u002Fi>#FFFFFF · α.80<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i class=\"chk\"><\u002Fi>#FFFFFF · α.10<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">borderSubtle<\u002Ftd><td><span class=\"sw\"><i style=\"background:#e2e3e8\"><\u002Fi>#3C3C43 · α.10<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#e6e8ef\"><\u002Fi>#182040 · α.07<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#2a2a30\"><\u002Fi>#FFFFFF · α.10<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">borderHighlight<\u002Ftd><td><span class=\"sw\"><i style=\"background:#fff\"><\u002Fi>#FFFFFF · α.90<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#fff\"><\u002Fi>#FFFFFF · α.85<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#3a3a42\"><\u002Fi>#FFFFFF · α.14<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">primary<\u002Ftd><td><span class=\"sw\"><i style=\"background:#3a64d8\"><\u002Fi>#3A64D8<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#515ed0\"><\u002Fi>#515ED0<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#e0a86a\"><\u002Fi>#E0A86A<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">primarySoft<\u002Ftd><td><span class=\"sw\"><i style=\"background:#eaeefb\"><\u002Fi>#EAEEFB<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#e8eaf8\"><\u002Fi>#E8EAF8<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#3a2e22\"><\u002Fi>#3A2E22<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">secondary<\u002Ftd><td><span class=\"sw\"><i style=\"background:#3f8f86\"><\u002Fi>#3F8F86<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#4d9b80\"><\u002Fi>#4D9B80<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#8fb6dd\"><\u002Fi>#8FB6DD<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">accent<\u002Ftd><td><span class=\"sw\"><i style=\"background:#7a6bbf\"><\u002Fi>#7A6BBF<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#e0915c\"><\u002Fi>#E0915C<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#8fc6a0\"><\u002Fi>#8FC6A0<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">warning<\u002Ftd><td><span class=\"sw\"><i style=\"background:#b78a3e\"><\u002Fi>#B78A3E<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#c79a4b\"><\u002Fi>#C79A4B<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#d8a86a\"><\u002Fi>#D8A86A<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">success<\u002Ftd><td><span class=\"sw\"><i style=\"background:#4a9b76\"><\u002Fi>#4A9B76<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#4d9b80\"><\u002Fi>#4D9B80<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#8fc6a0\"><\u002Fi>#8FC6A0<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">textPrimary<\u002Ftd><td><span class=\"sw\"><i style=\"background:#1c1c1e\"><\u002Fi>#1C1C1E<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#1a2030\"><\u002Fi>#1A2030<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#f2f2f3\"><\u002Fi>#F2F2F3<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">textSecondary<\u002Ftd><td><span class=\"sw\"><i style=\"background:#5f6168\"><\u002Fi>#5F6168<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#525c70\"><\u002Fi>#525C70<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#9d9ea3\"><\u002Fi>#FFFFFF · α.62<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">textMuted<\u002Ftd><td><span class=\"sw\"><i style=\"background:#8e9099\"><\u002Fi>#8E9099<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#8b93a6\"><\u002Fi>#8B93A6<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#6a6b70\"><\u002Fi>#FFFFFF · α.40<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">navSelected<\u002Ftd><td><span class=\"sw\"><i style=\"background:#3a64d8\"><\u002Fi>#3A64D8<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#515ed0\"><\u002Fi>#515ED0<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#e0a86a\"><\u002Fi>#E0A86A<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td class=\"name\">navUnselected<\u002Ftd><td><span class=\"sw\"><i style=\"background:#8e9099\"><\u002Fi>#8E9099<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#8b93a6\"><\u002Fi>#8B93A6<\u002Fspan><\u002Ftd><td><span class=\"sw\"><i style=\"background:#6a6b70\"><\u002Fi>#FFFFFF · α.40<\u002Fspan><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <p class=\"note\">Flow 其余场景覆盖 <span class=\"mono\">primary / accent / navSelected<\u002Fspan>：窗边下雨 #8FB6DD、雨后草地 #8FC6A0、纯白噪音 #9FB0C4、壁炉余烬 #D88A5A、清晨咖啡馆 #C9AD88。其余 token 不变。半透明 token 在 Compose 中用 <span class=\"mono\">Color(...).copy(alpha = …)<\u002Fspan> 或预乘后存常量。<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ④ -->\n  <section id=\"s4\">\n    <div class=\"sec-h\"><span class=\"n\">04<\u002Fspan><h2>组件系统<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">所有组件读取当前 <span class=\"mono\">LocalClassMateTheme<\u002Fspan>，仅消费 token；结构跨主题一致。<\u002Fp>\n    <div class=\"card\" style=\"padding:8px 8px 0;\">\n      <table>\n        <thead><tr><th>组件<\u002Fth><th>职责<\u002Fth><th>三主题差异<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"lbl\">ClassMateScaffold<\u002Ftd><td>页面骨架：背景 + 状态栏内边距 + 内容槽 + BottomNav<\u002Ftd><td>背景：Focus 纯色/极淡渐变；Vitality 浅色 + 极淡光晕；Flow 注入 AmbientBackdrop<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">BottomNav<\u002Ftd><td>底部 4 Tab 导航<\u002Ftd><td>Focus/Vitality 浅色 hairline；Flow 深色半透明；选中色 = navSelected<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">FocusCard<\u002Ftd><td>默认信息卡：surface + borderSubtle + 弱阴影<\u002Ftd><td>Focus 主用；Vitality 可切 GlassCard；Flow 用深色面<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">GlassCard<\u002Ftd><td>半透明玻璃卡（边缘高光 + 轻阴影模拟，不强求 blur）<\u002Ftd><td>Vitality/Flow 使用；Focus 默认不用，必要时极克制<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">PrimaryButton<\u002Ftd><td>主行动，填充 primary<\u002Ftd><td>仅色值变化；Flow 上文字用深色保证对比<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">SecondaryButton<\u002Ftd><td>次行动，primarySoft 底 / 描边<\u002Ftd><td>仅色值变化<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">IconButton<\u002Ftd><td>圆形图标按钮<\u002Ftd><td>Focus/Vitality 浅底；Flow 半透明白底<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">ModelStatusChip<\u002Ftd><td>低调模型状态徽标（BlueLM/Compatible/Local）<\u002Ftd><td>仅底色/文字色随主题；状态点语义色一致<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">ReviewTaskCard<\u002Ftd><td>复习任务卡：科目/优先级/理由/时长/反馈/开始<\u002Ftd><td>结构一致；Vitality 完成态有正反馈动效<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">FeedbackChip<\u002Ftd><td>四态反馈（已掌握/太难/需要例题/证据不对）<\u002Ftd><td>安静单行；语义色一致，仅容器色随主题<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">EvidenceCard<\u002Ftd><td>原文证据卡（Quiz/Review 内）<\u002Ftd><td>引文样式一致；底色随 surfaceSubtle<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">ProgressRing<\u002Ftd><td>环形进度<\u002Ftd><td>Focus 细环克制；Vitality 鼓励色 + 完成微动；Flow = BreathingTimerRing 基础<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">HistoryListItem<\u002Ftd><td>历史分组列表行：图标/标题/元信息/状态/重开<\u002Ftd><td>结构一致；仅分隔线与底色随主题<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">DiagnosticCard<\u002Ftd><td>诊断状态（连接/延迟/同步/额度/本地模型）<\u002Ftd><td>失败用中性琥珀点，禁止红色恐吓；跨主题仅换底<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">MaskedSecretRow<\u002Ftd><td>掩码密钥行（永不明文）<\u002Ftd><td>等宽掩码字符串；三主题一致<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">BuildInfoCard<\u002Ftd><td>版本/构建/通道/运行时<\u002Ftd><td>等宽数值；仅色值随主题<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">ExportActionCard<\u002Ftd><td>导出入口（时间轴/总结/复习计划）<\u002Ftd><td>结构一致；说明导出不含密钥<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">LiveCompanionScaffold<\u002Ftd><td>沉浸陪学骨架（Flow 专用）<\u002Ftd><td>仅 Flow：AmbientBackdrop + 呼吸环 + 控件 + 模拟标注<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">LiveEdgeGlow<\u002Ftd><td>课堂沉浸边缘光晕<\u002Ftd><td>仅 Flow / Knowledge Timeline 实时态；受 reduce-motion 约束<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">NoiseSceneCard<\u002Ftd><td>声音场景磁贴（mini 预览 + 选中态）<\u002Ftd><td>仅 Flow<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">BreathingTimerRing<\u002Ftd><td>呼吸计时环（7s 呼吸 + 进度弧）<\u002Ftd><td>仅 Flow；reduce-motion 时静态终态<\u002Ftd><\u002Ftr>\n          <tr><td class=\"lbl\">SoundMixerSlider<\u002Ftd><td>声音层音量滑杆（雨声/远雷/风声…）<\u002Ftd><td>仅 Flow；拖动有轻微 spring 反馈<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ⑤ -->\n  <section id=\"s5\">\n    <div class=\"sec-h\"><span class=\"n\">05<\u002Fspan><h2>动效规范<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">全部用 Compose 原生 <span class=\"mono\">animate*AsState / AnimatedVisibility / rememberInfiniteTransition / spring / tween<\u002Fspan> 实现，不依赖第三方库。全局尊重系统「减弱动态效果」，关闭时降级为静态终态。<\u002Fp>\n    <div class=\"grid3\">\n      <div class=\"card\">\n        <div class=\"theme-h\"><span class=\"dot\" style=\"background:#3a64d8\"><\u002Fspan><b>Focus<\u002Fb><em>原生 · 顺滑 · 微妙<\u002Fem><\u002Fdiv>\n        <ul class=\"tight\">\n          <li><b>页面进入<\u002Fb>：fadeIn + slideInVertically(10dp)，tween 280ms，标准缓动<\u002Fli>\n          <li><b>卡片出现<\u002Fb>：列表项 fadeIn，错峰 40–60ms；spring(damping≈0.9, stiffness=Medium)<\u002Fli>\n          <li><b>按钮按压<\u002Fb>：scale 0.975，spring 回弹，180ms<\u002Fli>\n          <li><b>Tab 切换<\u002Fb>：图标 200ms 轻微 scale + 颜色过渡，无指示器滑动炫技<\u002Fli>\n          <li><b>进度环<\u002Fb>：animateFloatAsState，600ms，无 bounce<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"theme-h\"><span class=\"dot\" style=\"background:#515ed0\"><\u002Fspan><b>Vitality<\u002Fb><em>鼓励 · 不花哨<\u002Fem><\u002Fdiv>\n        <ul class=\"tight\">\n          <li><b>成长反馈<\u002Fb>：进度环到目标时 1 次轻微 overshoot（spring stiffness 略低），不连续弹跳<\u002Fli>\n          <li><b>任务完成<\u002Fb>：绿勾 scaleIn(0.85→1) + 卡片轻微抬升，420ms 后归位<\u002Fli>\n          <li><b>连续学习<\u002Fb>：连击数字 count-up（tween 500ms）+ 火苗图标单次脉冲<\u002Fli>\n          <li>原则：每个反馈只奖励一次，避免持续动画分散注意<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"theme-h\"><span class=\"dot\" style=\"background:#e0a86a\"><\u002Fspan><b>Flow<\u002Fb><em>克制 · 不扰阅读<\u002Fem><\u002Fdiv>\n        <ul class=\"tight\">\n          <li><b>背景漂移<\u002Fb>：2 个光斑 offset 动画，20–28s，LinearEasing 无限循环<\u002Fli>\n          <li><b>呼吸计时环<\u002Fb>：scale 1↔1.06 + alpha，7s ease-in-out<\u002Fli>\n          <li><b>轻雨/光晕<\u002Fb>：少量竖线 translationY 循环，低 alpha；密度默认低<\u002Fli>\n          <li><b>场景切换<\u002Fb>：背景 crossfade 600ms；音频集合软切<\u002Fli>\n          <li><b>混音滑杆<\u002Fb>：拖动 spring 跟随；层级开关 200ms 颜色过渡<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ⑥ -->\n  <section id=\"s6\">\n    <div class=\"sec-h\"><span class=\"n\">06<\u002Fspan><h2>工程落地优先级<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">先稳地基，再做氛围，最后润色。<\u002Fp>\n    <div class=\"grid3\">\n      <div class=\"prio p0\">\n        <div class=\"ph\"><span class=\"tag\">P0<\u002Fspan><b style=\"font-size:15px;\">默认体验地基<\u002Fb><\u002Fdiv>\n        <ul class=\"tight\">\n          <li>Focus 默认主题落地（ClassMateTheme + token + 组件）<\u002Fli>\n          <li>Home / Review / History / Settings 统一到 Focus<\u002Fli>\n          <li>保持现有功能与数据流不变<\u002Fli>\n          <li>中文文案重新校对（不照抄图内文案）<\u002Fli>\n          <li>Android 化：去除任何 iPhone 外壳 / iOS 状态栏 / iOS 手势条<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"prio p1\">\n        <div class=\"ph\"><span class=\"tag\">P1<\u002Fspan><b style=\"font-size:15px;\">沉浸陪学<\u002Fb><\u002Fdiv>\n        <ul class=\"tight\">\n          <li>Live Companion 页面（含模拟转写标注）<\u002Fli>\n          <li>Flow 心流主题与 AmbientBackdrop<\u002Fli>\n          <li>白噪音场景 UI（NoiseSceneCard + 选择/混音）<\u002Fli>\n          <li>BreathingTimerRing 呼吸计时环<\u002Fli>\n          <li>LiveEdgeGlow 边缘光晕<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"prio p2\">\n        <div class=\"ph\"><span class=\"tag\">P2<\u002Fspan><b style=\"font-size:15px;\">增强与润色<\u002Fb><\u002Fdiv>\n        <ul class=\"tight\">\n          <li>Vitality 活力主题润色（轻玻璃 + 成长感）<\u002Fli>\n          <li>更丰富的完成 / 连击反馈<\u002Fli>\n          <li>主题切换过渡（crossfade，避免闪烁）<\u002Fli>\n          <li>更完整的动效细节与边角态<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ⑦ -->\n  <section id=\"s7\">\n    <div class=\"sec-h\"><span class=\"n\">07<\u002Fspan><h2>必须遵守的工程边界<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">以下条款请原样写入交接稿与 PR 检查清单。<\u002Fp>\n    <div class=\"card\">\n      <ul class=\"rules\">\n        <li>这是 <b>Android App<\u002Fb>：不要照搬 iPhone 外壳、iOS 状态栏与 iOS 手势条；状态栏/导航遵循 Android 规范。<\u002Fli>\n        <li>可借鉴 Apple-like 高级感，但 <b>UI 文案中不得出现 “Apple / iOS” 字样<\u002Fb>。<\u002Fli>\n        <li>中文文案需工程侧重新校对，<b>不能直接照抄设计图里的不自然文案<\u002Fb>。<\u002Fli>\n        <li>不要为追求真实 blur 牺牲性能；<b>优先半透明 surface + 边缘高光 + 轻阴影 + 渐变模拟玻璃<\u002Fb>，blur 仅在低成本处可选。<\u002Fli>\n        <li>Focus 默认主题必须<b>最克制、最干净、最适合长期学习<\u002Fb>，是其他主题的基准。<\u002Fli>\n        <li>Flow 主题可带雨声/白噪音氛围，但<b>不得影响阅读与任务操作<\u002Fb>，且不接管任务型页面。<\u002Fli>\n        <li>Live Companion 当前仍是<b>手动 / 模拟转写演示<\u002Fb>，UI 必须如实标注，<b>不得伪装真实 ASR 已完成<\u002Fb>。<\u002Fli>\n        <li>Settings <b>不得展示真实 AppID / AppKey / API Key<\u002Fb>，一律 masked 显示。<\u002Fli>\n        <li>若工程未做真正的加密持久化，<b>不要写“加密存储”<\u002Fb>；应写「仅本地使用，不写入仓库、日志和导出文件」。<\u002Fli>\n        <li>不要改动产品真实能力边界，<b>不得把未实现功能画成已完成<\u002Fb>。<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ⑧ -->\n  <section id=\"s8\">\n    <div class=\"sec-h\"><span class=\"n\">08<\u002Fspan><h2>交给 Claude Code / Opus 的实现摘要<\u002Fh2><\u002Fdiv>\n    <p class=\"sec-sub\">可直接复制为工程模型的任务说明。<\u002Fp>\n    <pre><span class=\"c\"># ClassMate · 三主题设计系统实现任务<\u002Fspan>\n\n<b>目标<\u002Fb>：在现有 Jetpack Compose 项目中实现三主题设计系统，<b>先落地 Focus 默认主题<\u002Fb>。\n\n<b>主题与 Token<\u002Fb>\n- 新增 ClassMateTheme：data class ClassMateColors 含全部 token\n  (background / backgroundGradientStart|End / surface / surfaceSubtle /\n   surfaceGlass / surfaceGlassStrong / borderSubtle / borderHighlight /\n   primary / primarySoft / secondary / accent / warning / success /\n   textPrimary / textSecondary / textMuted / navSelected / navUnselected)\n- 提供 focusColors() / vitalityColors() / flowColors(scene) 三套实现，\n  hex 取自交接稿第③节；半透明用 Color(...).copy(alpha=…)。\n- 用 CompositionLocal (LocalClassMateTheme) 下发；组件只消费 token，禁止硬编码颜色。\n- 字体用系统字族（system / SF 等价），定义 largeTitle/title/body/caption/mono 级别。\n\n<b>落地顺序<\u002Fb>\n1) <b>Focus 默认<\u002Fb>：ClassMateScaffold + BottomNav + FocusCard + 按钮 +\n   ReviewTaskCard + FeedbackChip + HistoryListItem + DiagnosticCard +\n   MaskedSecretRow + BuildInfoCard；统一 Home / Review / History / Settings。\n2) Flow：LiveCompanionScaffold + AmbientBackdrop(scene) + BreathingTimerRing +\n   NoiseSceneCard + SoundMixerSlider + LiveEdgeGlow（P1）。\n3) Vitality：GlassCard 增强 + 成长/完成反馈（P2）。\n\n<b>动效<\u002Fb>：仅用 Compose 原生 API（animate*AsState / AnimatedVisibility /\nrememberInfiniteTransition / spring / tween）；全局尊重「减弱动态效果」，\n关闭时渲染静态终态。规范见交接稿第⑤节。\n\n<b>必须保留、不得破坏的现有能力<\u002Fb>（<span class=\"g\">只换视觉，不动主链路<\u002Fspan>）：\n- BlueLM / Compatible / LocalFallback 三 Provider 与 <b>Provider 主链路不改<\u002Fb>\n- LearningStore / ReviewTask / Export / MindMap / VideoRecommendation 功能与数据流保持\n- <b>不削弱校验器<\u002Fb>（结构化校验 / 兜底逻辑照常）\n\n<b>安全与诚实（硬约束）<\u002Fb>\n- 不读取、不输出、不记录<b>真实密钥<\u002Fb>；UI 一律 masked。\n- 未做加密持久化则<b>不写“加密存储”<\u002Fb>，写「仅本地使用，不写入仓库 / 日志 / 导出」。\n- Live Companion 标注「手动 / 模拟转写演示 · 即将接入 ASR」，不伪装真实 ASR。\n- 不出现 Apple / iOS 字样；不照搬 iPhone 外壳 / iOS 状态栏 / 手势条。\n- 不把未实现功能画成已完成。\n\n<b>交付标准<\u002Fb>：改动后<b>所有测试通过<\u002Fb>；主题切换不闪烁；深色/浅色对比度达标；\nreduce-motion 下无残留隐藏元素（入场动画静态可见）。<\u002Fpre>\n  <\u002Fsection>\n\n  <footer>\n    ClassMate · Liquid Glass(Vitality) / Focus / Flow — 设计收束交接稿。配套高保真：ClassMate Focus.html（默认）、ClassMate Flow.html（沉浸）、ClassMate Liquid Glass.html（Vitality 来源）。\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
